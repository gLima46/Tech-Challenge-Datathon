name: Datathon CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src --ignore-missing-imports
        continue-on-error: true  # warning, não bloqueia

      - name: Security scan (bandit)
        run: bandit -r src -c pyproject.toml
        continue-on-error: true

      - name: Unit tests (pytest)
        run: |
          pytest tests \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=60 \
            --junitxml=test-results.xml \
            -m "not integration"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-and-tests
          path: |
            coverage.xml
            test-results.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Build serving image
        run: docker build -f src/serving/Dockerfile -t datathon-api:ci .
