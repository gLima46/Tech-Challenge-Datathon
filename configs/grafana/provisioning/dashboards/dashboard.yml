apiVersion: 1

providers:
  - name: "datathon-dashboards"
    orgId: 1
    folder: "Datathon"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
